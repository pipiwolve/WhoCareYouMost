spring:
  application:
    name: MedicalAgent
  ai:
    model:
      embedding: none
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max
      embedding:
        options:
          model: text-embedding-v2
          dimensions: 1536
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: medical-rag
        dimensions: 1536
        similarity: cosine
    mcp:
      client:
        enabled: ${MEDICAL_MCP_ENABLED:true}
        initialized: ${MEDICAL_MCP_INITIALIZED:false}
        toolcallback:
          enabled: true
        name: medical-amap-client
        version: 1.0.0
        request-timeout: ${MEDICAL_MCP_REQUEST_TIMEOUT:30s}
        type: SYNC
        stdio:
          connections:
            amapproxy:
              command: ${SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_AMAPPROXY_COMMAND:node}
              args:
                - ${SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_AMAPPROXY_ARGS_0:${user.dir}/scripts/amap-mcp-stdio-proxy.js}
                - ${SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_AMAPPROXY_ARGS_1:"@amap/amap-maps-mcp-server"}
              env:
                AMAP_MAPS_API_KEY: ${SPRING_AI_MCP_CLIENT_STDIO_CONNECTIONS_AMAPPROXY_ENV_AMAP_MAPS_API_KEY:${AMAP_MAPS_API_KEY:}}
  elasticsearch:
    uris: ${MEDICAL_ES_URIS:http://localhost:9200}
    username: ${MEDICAL_ES_USERNAME:}
    password: ${MEDICAL_ES_PASSWORD:}
server:
  port: 8123
  servlet:
    context-path: /api

logging:
  level:
    io.modelcontextprotocol.client.transport.StdioClientTransport: warn
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: info
    com.tay.medicalagent.interceptor.MyLogModelInterceptor: info
    com.tay.medicalagent.app.rag.hook.MedicalRagAgentHook: info
    com.tay.medicalagent.app.rag.retrieval.ElasticsearchHybridSearchClient: info
    com.tay.medicalagent.app.rag.interceptor.MedicalRagContextInterceptor: info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.tay.medicalagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

medical:
  web:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  rag:
    enabled: true
    bootstrap-on-startup: false
    context-metadata-key: rag_context
    applied-metadata-key: rag_applied
    vector-store:
      type: elasticsearch
      manifest-file: data/medical-rag/knowledge-manifest.json
      elasticsearch:
        fallback-to-simple-on-startup-failure: true
      simple:
        store-file: data/medical-rag/simple-vector-store.json
    ingestion:
      resource-location: classpath*:knowledge-base/medical/**/*
      token-splitter:
        chunk-size: 800
        min-chunk-size-chars: 350
        min-chunk-length-to-embed: 5
        max-num-chunks: 10000
        keep-separator: true
      keyword:
        enabled: false
        count: 5
      summary:
        enabled: false
        types:
          - CURRENT
        metadata-mode: INFERENCE
    retrieval:
      top-k: 5
      similarity-threshold: 0.35
      max-context-chars: 4000
      elasticsearch-hybrid:
        vector-top-k: 20
        lexical-top-k: 20
        rank-constant: 60
        title-boost: 2.5
        section-boost: 2.0
        content-boost: 1.0
    evaluation:
      dataset-location: classpath:evaluation/medical-rag-eval.json
      top-k: 5
  report:
    pdf:
      font-path: ${MEDICAL_REPORT_PDF_FONT_PATH:}
    snapshot:
      ttl: ${MEDICAL_REPORT_SNAPSHOT_TTL:30m}
      max-sessions: ${MEDICAL_REPORT_SNAPSHOT_MAX_SESSIONS:500}
      cleanup-interval: ${MEDICAL_REPORT_SNAPSHOT_CLEANUP_INTERVAL:5m}
      stale-lock-ttl: ${MEDICAL_REPORT_SNAPSHOT_STALE_LOCK_TTL:60s}
      degraded-planning-retry-after: ${MEDICAL_REPORT_SNAPSHOT_DEGRADED_PLANNING_RETRY_AFTER:30s}
    planning:
      enabled: true
      # mode: off|local|mcp|agentic
      # Default to deterministic MCP for report queries. Agentic mode remains opt-in
      # via env when we explicitly want the extra latency/variance tradeoff.
      mode: ${MEDICAL_REPORT_PLANNING_MODE:mcp}
      top-k: 3
      route-planning-enabled: true
      mcp:
        server-name: ${MEDICAL_REPORT_PLANNING_MCP_SERVER_NAME:mcp-server/amap-maps}
        timeout-ms: ${MEDICAL_REPORT_PLANNING_MCP_TIMEOUT_MS:6000}
        around-radius-meters: ${MEDICAL_REPORT_PLANNING_MCP_AROUND_RADIUS_METERS:5000}
        hospital-keyword: ${MEDICAL_REPORT_PLANNING_MCP_HOSPITAL_KEYWORD:医院}
        hospital-types: ${MEDICAL_REPORT_PLANNING_MCP_HOSPITAL_TYPES:090100|090101|090102|090400}
      fallback:
        hospitals:
          - name: 中山大学附属第一医院
            address: 广州市越秀区中山二路58号
            tier3a: true
            latitude: 23.1293
            longitude: 113.2862
          - name: 广东省人民医院
            address: 广州市越秀区中山二路106号
            tier3a: true
            latitude: 23.1271
            longitude: 113.2816
          - name: 中山大学孙逸仙纪念医院
            address: 广州市越秀区沿江西路107号
            tier3a: true
            latitude: 23.1119
            longitude: 113.2505
          - name: 南方医科大学南方医院
            address: 广州市白云区广州大道北1838号
            tier3a: true
            latitude: 23.1909
            longitude: 113.3256
          - name: 广州医科大学附属第一医院
            address: 广州市越秀区沿江西路151号
            tier3a: true
            latitude: 23.1154
            longitude: 113.2569
